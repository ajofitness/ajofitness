{% extends 'base.html' %}
{% block title %}Errore {{ code }} - {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <div class="ft-error-page">
    <div class="ft-error-code">{{ code }}</div>
    <h2 class="mb-3">{{ message }}</h2>
    <p class="text-light-50 mb-4">La pagina che cercavi non &egrave; disponibile o si &egrave; verificato un errore.</p>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" class="btn ft-btn-primary btn-lg">
      <i class="bi bi-house"></i> Torna alla home
    </a>
  </div>
</div>
{% endblock %}
