<div class="modal fade" id="uploadModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content ft-modal">
      <form method="post" action="{{ url_for('photos_upload') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-camera"></i> Carica foto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Data</label>
            <input type="date" name="date" class="form-control ft-input" value="{{ today().isoformat() }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Vista frontale</label>
            <input type="file" name="photo_front" accept="image/*" class="form-control ft-input">
          </div>
          <div class="mb-3">
            <label class="form-label">Vista laterale</label>
            <input type="file" name="photo_side" accept="image/*" class="form-control ft-input">
          </div>
          <p class="small text-light-50 mt-2"><i class="bi bi-info-circle"></i> Scatta in buona luce, stessa posa e stesso sfondo per un confronto accurato.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn ft-btn-outline" data-bs-dismiss="modal">Annulla</button>
          <button type="submit" class="btn ft-btn-primary"><i class="bi bi-upload"></i> Carica</button>
        </div>
      </form>
    </div>
  </div>
</div>
